<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Tilwen — Tanit mark (filled variant) -->
  <!-- Crescent -->
  <path d="M38,14 Q50,4 62,14" fill="none" stroke="#080808" stroke-width="4" stroke-linecap="round"/>
  <!-- Head — filled circle -->
  <circle cx="50" cy="30" r="13" fill="#080808"/>
  <!-- Neck -->
  <line x1="50" y1="43" x2="50" y2="54" stroke="#080808" stroke-width="4" stroke-linecap="round"/>
  <!-- Arms — horizontal bar -->
  <line x1="10" y1="54" x2="90" y2="54" stroke="#080808" stroke-width="4" stroke-linecap="round"/>
  <!-- Arm upturns -->
  <line x1="10" y1="54" x2="5" y2="45" stroke="#080808" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="90" y1="54" x2="95" y2="45" stroke="#080808" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Body — filled triangle -->
  <polygon points="50,54 8,96 92,96" fill="#080808"/>
</svg>
